version: 2

project_name: neo4j-mcp-canary

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: neo4j-cli
    main: ./cmd/neo4j-cli
    binary: neo4j-cli
    env:
      - CGO_ENABLED=0        # pure Go, no C deps — enables clean cross-compilation
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Exclude combos you don't want (e.g. Windows ARM)
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -X "main.Version={{.Tag}}"

archives:
  - id: default
  # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .Binary }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats:
          - zip
    # .zip for Windows, .tar.gz for everything else
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE.txt
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
