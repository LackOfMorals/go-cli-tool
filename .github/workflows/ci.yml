name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install mockgen
        run: go install go.uber.org/mock/mockgen@v0.6.0

      - name: Run go generate
        run: go generate ./...

      - name: Verify generated files are up to date
        run: |
          if ! git diff --exit-code; then
            echo "::error::generated files are out of date. Run 'go generate ./...' and commit the result (e.g. internal/skill/skill.md.gen, mocks)."
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
