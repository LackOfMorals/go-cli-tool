  - id: task-007
    title: "Implement SkillService (Install / Remove / List)"
    description: |
      Create internal/service/skill_service.go. Install writes the embedded SKILL.md (skill.SkillMD)
      directly to <agent.skills_dir>/neo4j-cli/SKILL.md, removing any existing target first. With empty
      agentName, install to every detected agent; error if none detected. Remove deletes
      <skills_dir>/neo4j-cli/; empty agentName removes from every agent that has it. List returns the
      AgentStatus table for all known agents. No canonical/cache dir.
    status: pending
    dependencies:
      - task-002
      - task-006
    acceptance_criteria:
      - "Install with empty agentName targets every detected agent and errors with a clear message if none detected"
      - "Install with a known agent name succeeds even if the agent isn't detected; unknown name returns error"
      - "Install removes any pre-existing target (file, dir, or symlink) before writing"
      - "Remove tolerates missing targets silently per agent"
      - "List returns one entry per AGENTS member with correct detected/installed booleans"
      - "Re-running Install is idempotent (no error, files identical)"
    completed_at: null

