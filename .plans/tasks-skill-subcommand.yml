    description: |
      Create internal/skill/agents.go with the Agent struct (name, display_name, detect_dir, skills_dir),
      the hardcoded AGENTS slice mirroring the Rust reference (10 agents: claude-code, cursor, windsurf,
      copilot, gemini-cli, cline, codex, pi, opencode, junie), an expandPath helper supporting `~` and
      `$XDG_CONFIG_HOME` (default `~/.config`), and FindAgent / DetectAgents helpers.
      Include focused unit tests for path expansion and agent lookup.
    status: completed
    dependencies: []
    acceptance_criteria:
      - "AGENTS slice contains all 10 reference agents with correct detect/skills paths"
      - "expandPath handles `~/`, bare `~`, `$XDG_CONFIG_HOME`, and missing-XDG fallback to `~/.config`"
      - "FindAgent is case-insensitive and returns nil for unknown names"
      - "DetectAgents returns only agents whose detect_dir exists on disk (use t.TempDir + HOME override in tests)"
