      - "go generate ./... produces no diff"
      - ".changes/unreleased/added-toon-output-format.yaml exists, parses as valid changie YAML, and accurately describes the shipped behaviour"
      - "A manual smoke test of cypher --format toon (or an equivalent recorded test invocation) shows clean TOON output with no sentinel keys"
      - "Branch is in a state ready for /hone:finalize or PR creation"
